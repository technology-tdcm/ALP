<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Advance Learning Path</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0F1233 0%, #1A1A2E 50%, #1E28B4 100%); }
        .login-card { background: #fff; border-radius: 16px; padding: 40px; width: 400px; max-width: 90vw; box-shadow: 0 16px 48px rgba(0,0,0,0.3); }
        .login-card h1 { font-family: 'Poppins', sans-serif; font-size: 24px; text-align: center; margin-bottom: 8px; color: #1A1A2E; }
        .login-card p { text-align: center; color: #6c6c80; margin-bottom: 28px; font-size: 14px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #40405a; margin-bottom: 6px; }
        .form-group input { width: 100%; padding: 12px 16px; border: 2px solid #e8e8ed; border-radius: 8px; font-size: 14px; font-family: 'Inter', sans-serif; transition: all 0.3s; }
        .form-group input:focus { outline: none; border-color: #1E28B4; box-shadow: 0 0 0 4px rgba(30,40,180,0.1); }
        .btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #1E28B4, #FA6400); color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; font-family: 'Poppins', sans-serif; cursor: pointer; transition: all 0.3s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(30,40,180,0.3); }
        .error { background: #fee; color: #c00; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none; }
        .logo { text-align: center; margin-bottom: 24px; }
        .logo img { height: 40px; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo"><img src="../advance_learning_path_logo.jpeg" alt="ALP"></div>
        <h1>Admin Panel</h1>
        <p>Sign in to manage your website</p>
        <div class="error" id="error"></div>
        <form id="loginForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Enter username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn">Sign In</button>
        </form>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            var err = document.getElementById('error');
            var btn = this.querySelector('.btn');
            btn.textContent = 'Signing in...';
            btn.disabled = true;
            fetch('/api/admin/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: document.getElementById('username').value, password: document.getElementById('password').value })
            }).then(function(r) { return r.json(); }).then(function(data) {
                if (data.error) { err.textContent = data.error; err.style.display = 'block'; btn.textContent = 'Sign In'; btn.disabled = false; return; }
                localStorage.setItem('alp_token', data.token);
                window.location.href = '/admin';
            }).catch(function() { err.textContent = 'Connection error'; err.style.display = 'block'; btn.textContent = 'Sign In'; btn.disabled = false; });
        });
    </script>
</body>
</html>
